# ============================================================
# APPLICATION CONFIG — swap values per environment / client
# ============================================================

spring.application.name=dealership-api
server.port=8080

# ── Database ─────────────────────────────────────────────────
# Replace with real credentials. Use environment variables in prod.
# DB_URL supports Railway's DATABASE_URL or a jdbc:// URL directly
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dealership_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:openclaw}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate

# Flyway — auto-runs migrations in db/migration on startup
# baseline-on-migrate handles existing DBs that predate Flyway being added
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── CORS ─────────────────────────────────────────────────────
# Add your frontend origin here (and Vercel / Netlify URL in prod)
dealership.cors.allowed-origins=http://localhost:5173,http://localhost:3000,*

# ── JWT ──────────────────────────────────────────────────────
# IMPORTANT: Change this secret before deploying. Use a long random string.
dealership.jwt.secret=${JWT_SECRET:CHANGE_THIS_SECRET_BEFORE_DEPLOYING_USE_256_BIT_KEY}
dealership.jwt.expiration-ms=86400000

# ── Admin credentials (hardcoded, easily swappable) ──────────
# IMPORTANT: Change before going live.
dealership.admin.username=${ADMIN_USERNAME:admin}
dealership.admin.password=${ADMIN_PASSWORD:changeme123}

# ── Manager credentials ───────────────────────────────────────
dealership.manager.username=${MANAGER_USERNAME:manager}
dealership.manager.password=${MANAGER_PASSWORD:manager123}

# ── Cloudinary (image storage) ───────────────────────────────
# Set these as environment variables — never commit real credentials
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:[CLOUDINARY_CLOUD_NAME]}
cloudinary.api-key=${CLOUDINARY_API_KEY:[CLOUDINARY_API_KEY]}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:[CLOUDINARY_API_SECRET]}

# ── Multipart (image uploads) ────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ── Actuator (optional — remove in prod if not needed) ───────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Facebook Feed Configuration ──────────────────────────────
# Base URL for feed links (change to your production domain)
facebook.feed.base-url=http://localhost:8080
# Image CDN URL (if using Cloudinary, use your Cloudinary URL)
facebook.feed.image-base-url=http://localhost:8080

# ── KBB Valuation Configuration ──────────────────────────────
# Maximum age of KBB data before refresh (in hours)
valuation.kbb.max-age-hours=168

# ── Email Configuration (Gmail SMTP) ─────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:dugas.openclaw@gmail.com}
spring.mail.password=${MAIL_PASSWORD:[GMAIL_APP_PASSWORD]}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Client Intake Email ──────────────────────────────────────
dealership.email.from=Dugas.openclaw@gmail.com
dealership.email.admin-to=StepDugas@gmail.com
dealership.email.reply-to=Dugas.openclaw@gmail.com
